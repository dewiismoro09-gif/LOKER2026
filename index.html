<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info Loker Jabodetabek - Galeri Lowongan Kerja</title>
    <!-- Menggunakan Tailwind CSS untuk desain yang cepat dan responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <!-- Header / Navbar -->
    <header class="bg-blue-600 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-briefcase text-2xl text-yellow-300"></i>
                <h1 class="text-2xl font-bold tracking-wide">infoloker<span class="text-yellow-300">jabodetabek</span></h1>
            </div>
            <p class="text-sm bg-blue-700 px-3 py-1 rounded-full text-blue-100">
                Pusat Informasi Lowongan Kerja Terupdate
            </p>
        </div>
    </header>

    <!-- Konten Utama -->
    <main class="container mx-auto px-4 py-8 flex-grow">
        
        <!-- Section Album / Galeri -->
        <section>
            <div class="mb-6">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <i class="fa-solid fa-images text-blue-600"></i> Album Info Lowongan Kerja
                </h2>
                <p class="text-sm text-gray-500 mt-1">Daftar brosur lowongan kerja aktif di wilayah Jakarta, Bogor, Depok, Tangerang, dan Bekasi.</p>
            </div>

            <!-- Grid Galeri Foto -->
            <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-3 gap-6">
                <!-- Foto loker akan muncul di sini secara otomatis dari data JavaScript -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-400 text-center py-4 text-sm mt-12 border-t border-gray-700">
        <p>&copy; 2026 <span class="font-semibold text-white">infolokerjabodetabek</span>. All rights reserved.</p>
    </footer>

    <!-- JavaScript Data Album -->
    <script>
        // DATA ALBUM LOKER RESMI
        const dataLoker = [
            {
                company: "PT Astra International Tbk",
                title: "Astra Career Program - Salesman & Operation Staff (Penempatan Wilayah Bogor, Depok, Bekasi & Jakarta)",
                image: "https://images.unsplash.com/photo-1560179707-f14e90ef3623?auto=format&fit=crop&w=600&q=80",
                date: "01 Jul 2026",
                careerLink: "https://career.astra.co.id/lowongan"
            },
            {
                company: "PT Lion Super Indo",
                title: "Super Indo Apprentice Program (SIAP) - Kasir & Pramuniaga (Penempatan Seluruh Store Jabodetabek)",
                image: "https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=600&q=80",
                date: "01 Jul 2026",
                careerLink: "https://superindo.jobseeker.software/"
            },
            {
                company: "PT Kereta Api Indonesia (Persero)",
                title: "Rekrutmen KAI Group - Kru Operasional & Pelayanan Stasiun (Penempatan DAOP 1 Jakarta & Sekitarnya)",
                image: "https://images.unsplash.com/photo-1474487548417-781cb71495f3?auto=format&fit=crop&w=600&q=80",
                date: "01 Jul 2026",
                careerLink: "https://e-recruitment.kai.id/"
            }
        ];

        const galleryGrid = document.getElementById('galleryGrid');

        // Fungsi untuk menampilkan foto ke dalam album grid
        function tampilkanAlbum() {
            galleryGrid.innerHTML = "";

            dataLoker.forEach(loker => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl overflow-hidden shadow-sm border border-gray-200 hover:shadow-md transition duration-300 flex flex-col justify-between group";
                card.innerHTML = `
                    <div>
                        <!-- Container Foto -->
                        <div class="relative overflow-hidden h-64 bg-gray-100 flex items-center justify-center border-b">
                            <img src="${loker.image}" alt="${loker.title}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                            <!-- Badge Nama Perusahaan -->
                            <span class="absolute top-3 left-3 bg-blue-600 text-white text-xs font-bold px-3 py-1 rounded-full shadow">
                                ${loker.company}
                            </span>
                        </div>
                        <!-- Judul Loker -->
                        <div class="p-5">
                            <h3 class="font-semibold text-gray-800 text-base leading-snug line-clamp-3 group-hover:text-blue-600 transition">
                                ${loker.title}
                            </h3>
                        </div>
                    </div>
                    <!-- Footer Info Card & Link Karir -->
                    <div class="px-5 pb-5">
                        <div class="flex items-center justify-between text-xs text-gray-400 mb-4 pt-2 border-t border-gray-100">
                            <span><i class="fa-regular fa-calendar-days mr-1"></i> ${loker.date}</span>
                            <span class="bg-green-100 text-green-700 font-semibold px-2 py-0.5 rounded">Aktif</span>
                        </div>
                        <!-- Tombol Link Karir Resmi -->
                        <a href="${loker.careerLink}" target="_blank" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-center font-medium py-2 px-4 rounded-lg transition shadow-sm block text-sm flex items-center justify-center gap-2">
                            Lamar Sekarang <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                        </a>
                    </div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        // Jalankan fungsi saat halaman web dibuka
        window.onload = tampilkanAlbum;
    </script>
</body>
</html>
